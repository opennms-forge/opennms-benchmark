---
# Lab-specific Grafana overrides for the benchmark stack.
# Kept in group_vars (not extra_vars) so the grafana.grafana collection's
# set_fact can merge these with grafana_ini_default via recursive combine.
grafana_ini:
  server:
    http_port: 3000
    root_url: "%(protocol)s://%(domain)s/grafana/"
    serve_from_sub_path: true
  security:
    admin_user: admin
    admin_password: admin
  database:
    type: sqlite3
  auth: {}

# Dashboards are provisioned by bootstrap/roles/grafana, not this collection.
# Disable provisioning-file mode so the collection does not write ansible.yml into
# /etc/grafana/provisioning/dashboards/ alongside our own opennms-core.yml provider.
grafana_use_provisioning: false
grafana_dashboards_dir: "/nonexistent/grafana-dashboards"
