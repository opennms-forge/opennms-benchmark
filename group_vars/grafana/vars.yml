---
# Lab-specific Grafana overrides for the benchmark stack.
# Kept in group_vars (not extra_vars) so the grafana.grafana collection's
# set_fact can merge these with grafana_ini_default via recursive combine.
grafana_ini:
  server:
    http_port: 3000
    root_url: "%(protocol)s://%(domain)s/grafana/"
    serve_from_sub_path: true
  security:
    admin_user: admin
    admin_password: admin
  database:
    type: sqlite3
  auth: {}

# Dashboards and datasources are provisioned by bootstrap/roles/grafana via files,
# not by this collection. Disable the collection's provisioning and datasource
# management so it does not conflict with our provisioning files.
grafana_use_provisioning: false
grafana_dashboards_dir: "/nonexistent/grafana-dashboards"
# Empty list prevents the collection's datasource module from running (it rejects
# plugin datasource types like opennms-performance-datasource).
grafana_datasources: []
