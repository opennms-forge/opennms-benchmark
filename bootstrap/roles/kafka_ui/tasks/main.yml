---
- name: Deploy kafka-ui systemd unit
  ansible.builtin.template:
    src: kafka-ui.service.j2
    dest: /etc/systemd/system/kafka-ui.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart kafka-ui
  tags: ["monitoring", "kafka-ui"]

- name: Flush handlers before enabling service
  ansible.builtin.meta: flush_handlers
  tags: ["monitoring", "kafka-ui"]

- name: Enable Kafka UI as a service
  ansible.builtin.service:
    name: kafka-ui.service
    state: started
    enabled: true
  tags: ["monitoring", "kafka-ui"]
