---
- name: Deploy app-starter systemd unit
  ansible.builtin.template:
    src: app-starter.service.j2
    dest: /etc/systemd/system/app-starter.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart app-starter
  tags: ["monitoring", "app-starter"]

- name: Flush handlers before enabling app-starter service
  ansible.builtin.meta: flush_handlers
  tags: ["monitoring", "app-starter"]

- name: Enable app-starter as a service
  ansible.builtin.service:
    name: app-starter.service
    state: started
    enabled: true
  tags: ["monitoring", "app-starter"]
