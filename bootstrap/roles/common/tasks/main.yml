---
- name: "Set Time Zone to {{ common_timezone }}"
  community.general.timezone:
    name: "{{ common_timezone }}"

- name: Update APT cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Copy user settings to /home/labuser
  ansible.builtin.copy:
    src: files/home/{{ item }}
    dest: /home/labuser/
    owner: labuser
    group: labuser
    mode: "0644"
  with_items:
    - ".bash_aliases"
    - ".bashrc"
    - ".htoprc"
    - ".screenrc"

- name: Copy user settings to /root
  ansible.builtin.copy:
    src: files/home/{{ item }}
    dest: /root/
    owner: root
    group: root
    mode: "0644"
  with_items:
    - ".bash_aliases"
    - ".bashrc"
    - ".htoprc"
    - ".screenrc"

- name: Copy issues.net /etc
  ansible.builtin.copy:
    src: files/etc/{{ item }}
    dest: /etc/
    owner: root
    group: root
    mode: "0644"
  with_items:
    - "issue.net"

- name: Ensures sshd_config.d exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    mode: "0755"
    state: directory
  notify:
    - Reload sshd
  tags: ["ssh"]

- name: Copy custom sshd_config /etc/ssh
  ansible.builtin.copy:
    src: files/etc/ssh/sshd_config.d/custom.conf
    dest: /etc/ssh/sshd_config.d
    owner: root
    group: root
    mode: "0600"
  notify:
    - Reload sshd
  tags: ["ssh"]

- name: Configure journald
  ansible.builtin.copy:
    src: files/etc/systemd/journald.conf
    dest: /etc/systemd/
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload journald
  tags: ["journald"]

- name: "Install dependencies"
  tags: ["system", "tools"]
  ansible.builtin.apt:
    pkg:
      - ansible
      - apt-listchanges
      - apt-transport-https
      - bzip2
      - btop
      - cron
      - chrony
      - curl
      - debian-goodies
      - git-core
      - htop
      - iftop
      - iotop
      - iperf3
      - iptraf
      - less
      - lm-sensors
      - mailutils
      - moreutils
      - mtr
      - needrestart
      - ripgrep
      - rkhunter
      - rsyslog
      - screen
      - smartmontools
      - snmp
      - software-properties-common
      - sudo
      - sysfsutils
      - sysstat
      - vim-nox
    state: present
