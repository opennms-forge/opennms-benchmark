---
- name: Reload sysctl
  ansible.builtin.command: /sbin/sysctl --system
  changed_when: false
- name: Reload chrony
  ansible.builtin.service:
    name: chrony
    state: restarted
- name: Reload sshd
  ansible.builtin.service:
    name: ssh
    state: restarted
- name: Reload journald
  ansible.builtin.service:
    name: systemd-journald
    state: restarted
