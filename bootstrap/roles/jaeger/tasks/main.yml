---
- name: Create Jaeger config directory
  ansible.builtin.file:
    path: "{{ jaeger_config_dir }}"
    state: directory
    mode: "0755"
  tags: ["monitoring", "jaeger"]

- name: Deploy Jaeger config
  ansible.builtin.template:
    src: jaeger-config.yaml.j2
    dest: "{{ jaeger_config_dir }}/config.yaml"
    mode: "0644"
  notify:
    - Restart jaeger
  tags: ["monitoring", "jaeger"]

- name: Deploy Jaeger systemd unit
  ansible.builtin.template:
    src: jaeger.service.j2
    dest: /etc/systemd/system/jaeger.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart jaeger
  tags: ["monitoring", "jaeger"]

- name: Flush handlers before enabling Jaeger service
  ansible.builtin.meta: flush_handlers
  tags: ["monitoring", "jaeger"]

- name: Enable Jaeger as a service
  ansible.builtin.service:
    name: jaeger.service
    state: started
    enabled: true
  tags: ["monitoring", "jaeger"]
