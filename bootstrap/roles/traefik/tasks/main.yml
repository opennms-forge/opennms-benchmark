---
- name: Create Traefik directories
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ traefik_config_dir }}"
    - "{{ traefik_config_dir }}/certs"
    - "{{ traefik_config_dir }}/dynamic"
  tags: ["traefik"]

- name: Deploy Traefik systemd unit
  ansible.builtin.template:
    src: traefik.service.j2
    dest: /etc/systemd/system/traefik.service
    mode: "0644"
  notify:
    - Reload systemd
    - Restart traefik
  tags: ["traefik"]

- name: Flush handlers before copying config files
  ansible.builtin.meta: flush_handlers
  tags: ["traefik"]

- name: Copy Traefik static config
  ansible.builtin.copy:
    src: traefik/traefik.yml
    dest: "{{ traefik_config_dir }}/traefik.yml"
    mode: "0644"
  notify:
    - Restart traefik
  tags: ["traefik"]

- name: Copy Traefik dynamic routes
  ansible.builtin.copy:
    src: traefik/dynamic/routes.yml
    dest: "{{ traefik_config_dir }}/dynamic/routes.yml"
    mode: "0644"
  notify:
    - Restart traefik
  tags: ["traefik"]

- name: Generate self-signed TLS certificate
  ansible.builtin.command:
    cmd: >
      openssl req -x509 -newkey rsa:4096
        -keyout {{ traefik_config_dir }}/certs/lab.key
        -out {{ traefik_config_dir }}/certs/lab.crt
        -days 3650 -nodes
        -subj "/CN=monitoring/O=Lab"
    creates: "{{ traefik_config_dir }}/certs/lab.crt"
  tags: ["traefik"]

- name: Restrict cert key permissions
  ansible.builtin.file:
    path: "{{ traefik_config_dir }}/certs/lab.key"
    mode: "0600"
  tags: ["traefik"]

- name: Enable Traefik as a service
  ansible.builtin.service:
    name: traefik.service
    state: started
    enabled: true
  tags: ["traefik"]
