---
http:
  routers:
    app-starter:
      rule: "Path(`/`) || PathPrefix(`/_next`)"
      entryPoints:
        - websecure
      service: app-starter
      tls: {}
    grafana:
      rule: "PathPrefix(`/grafana`)"
      entryPoints:
        - websecure
      service: grafana
      tls: {}
    prometheus:
      rule: "PathPrefix(`/prometheus`)"
      entryPoints:
        - websecure
      service: prometheus
      tls: {}
    jaeger:
      rule: "PathPrefix(`/jaeger`)"
      entryPoints:
        - websecure
      service: jaeger
      middlewares:
        - jaeger-strip
      tls: {}
    opennms:
      rule: "PathPrefix(`/opennms`)"
      entryPoints:
        - websecure
      service: opennms
      tls: {}
    kafka:
      rule: "PathPrefix(`/kafka`)"
      entryPoints:
        - websecure
      service: kafka
      tls: {}
    pgadmin:
      rule: "PathPrefix(`/pgadmin`)"
      entryPoints:
        - websecure
      service: pgadmin
      tls: {}
    kibana:
      rule: "PathPrefix(`/kibana`)"
      entryPoints:
        - websecure
      service: kibana
      middlewares:
        - kibana-strip
      tls: {}
    opensim:
      rule: "PathPrefix(`/opensim`)"
      entryPoints:
        - websecure
      service: opensim
      middlewares:
        - opensim-strip
      tls: {}
    opensim-assets:
      rule: "PathPrefix(`/web`) || PathPrefix(`/api`) || Path(`/logo.png`)"
      entryPoints:
        - websecure
      service: opensim
      tls: {}
  middlewares:
    jaeger-strip:
      stripPrefix:
        prefixes:
          - /jaeger
    kibana-strip:
      stripPrefix:
        prefixes:
          - /kibana
    opensim-strip:
      stripPrefix:
        prefixes:
          - /opensim

  services:
    grafana:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3000"

    prometheus:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:9090"

    jaeger:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:16686"

    opennms:
      loadBalancer:
        servers:
          - url: "http://192.0.2.197:8980"

    kafka:
      loadBalancer:
        servers:
          - url: "http://192.0.2.198:8080"

    pgadmin:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5050"

    kibana:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:5601"

    opensim:
      loadBalancer:
        servers:
          - url: "http://192.0.2.201:8080"

    app-starter:
      loadBalancer:
        servers:
          - url: "http://host.docker.internal:3010"
