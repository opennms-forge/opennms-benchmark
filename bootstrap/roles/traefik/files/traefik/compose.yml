---
services:

  traefik:
    image: traefik:v3
    deploy:
      resources:
        limits:
          cpus: 0.5
          memory: 128m
    environment:
      TZ: UTC
    ports:
      - "80:80/tcp"
      - "443:443/tcp"
    volumes:
      - ./traefik.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/etc/traefik/dynamic:ro
      - ./certs:/etc/traefik/certs:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
