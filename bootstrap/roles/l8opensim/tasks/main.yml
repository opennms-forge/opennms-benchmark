---
- name: Disable and remove legacy monitoring-net-ipv4 loopback route service
  ansible.builtin.systemd:
    name: monitoring-net-ipv4.service
    state: stopped
    enabled: false
  failed_when: false
  tags: ["l8opensim"]

- name: Remove legacy monitoring-net-ipv4 service unit file
  ansible.builtin.file:
    path: /etc/systemd/system/monitoring-net-ipv4.service
    state: absent
  notify: Reload systemd daemon
  tags: ["l8opensim"]

- name: Install opensim-forward systemd service
  ansible.builtin.template:
    src: opensim-forward.service.j2
    dest: /etc/systemd/system/opensim-forward.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd daemon
  tags: ["l8opensim"]

- name: Flush handlers to reload systemd before starting opensim-forward
  ansible.builtin.meta: flush_handlers
  tags: ["l8opensim"]

- name: Enable and start opensim-forward service
  ansible.builtin.systemd:
    name: opensim-forward.service
    enabled: true
    state: started
  tags: ["l8opensim"]

- name: Pull l8opensim image
  community.docker.docker_image:
    name: "{{ l8opensim_image }}"
    source: pull
    force_source: true
  tags: ["l8opensim"]

- name: Run l8opensim container
  community.docker.docker_container:
    name: l8opensim
    image: "{{ l8opensim_image }}"
    state: started
    restart_policy: "{{ l8opensim_restart_policy }}"
    privileged: true
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    command: >-
      -auto-start-ip {{ l8opensim_auto_start_ip }}
      -auto-count {{ l8opensim_auto_count }}
      -auto-netmask {{ l8opensim_auto_netmask }}
      -port {{ l8opensim_web_port }}
  tags: ["l8opensim"]
