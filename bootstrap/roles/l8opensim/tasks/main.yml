---
- name: Disable and remove legacy monitoring-net-ipv4 loopback route service
  ansible.builtin.systemd:
    name: monitoring-net-ipv4.service
    state: stopped
    enabled: false
  failed_when: false
  tags: ["l8opensim"]

- name: Remove legacy monitoring-net-ipv4 service unit file
  ansible.builtin.file:
    path: /etc/systemd/system/monitoring-net-ipv4.service
    state: absent
  notify: Reload systemd daemon
  tags: ["l8opensim"]

- name: Install opensim-forward systemd service
  ansible.builtin.template:
    src: opensim-forward.service.j2
    dest: /etc/systemd/system/opensim-forward.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd daemon
  tags: ["l8opensim"]

- name: Flush handlers to reload systemd before starting opensim-forward
  ansible.builtin.meta: flush_handlers
  tags: ["l8opensim"]

- name: Enable and start opensim-forward service
  ansible.builtin.systemd:
    name: opensim-forward.service
    enabled: true
    state: started
  tags: ["l8opensim"]

- name: Deploy l8opensim systemd unit
  ansible.builtin.template:
    src: l8opensim.service.j2
    dest: /etc/systemd/system/l8opensim.service
    owner: root
    group: root
    mode: "0644"
  notify: Reload systemd daemon
  tags: ["l8opensim"]

- name: Flush handlers before enabling l8opensim service
  ansible.builtin.meta: flush_handlers
  tags: ["l8opensim"]

- name: Enable and start l8opensim service
  ansible.builtin.systemd:
    name: l8opensim.service
    enabled: true
    state: started
  tags: ["l8opensim"]
