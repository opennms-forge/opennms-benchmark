---
- name: Disable and remove legacy monitoring-net-ipv4 loopback route service
  ansible.builtin.systemd:
    name: monitoring-net-ipv4.service
    state: stopped
    enabled: false
  failed_when: false
  tags: ["l8opensim"]

- name: Remove legacy monitoring-net-ipv4 service unit file
  ansible.builtin.file:
    path: /etc/systemd/system/monitoring-net-ipv4.service
    state: absent
  notify: Reload systemd daemon
  tags: ["l8opensim"]

- name: Create l8opensim build directory
  ansible.builtin.file:
    path: /opt/l8opensim
    state: directory
    mode: "0755"
  tags: ["l8opensim"]

- name: Copy l8opensim Dockerfile
  ansible.builtin.copy:
    src: Dockerfile
    dest: /opt/l8opensim/Dockerfile
    mode: "0644"
  tags: ["l8opensim"]

- name: Build l8opensim image
  community.docker.docker_image:
    name: "{{ l8opensim_image }}"
    source: build
    build:
      path: /opt/l8opensim
      pull: true
    force_source: true
  tags: ["l8opensim"]

- name: Run l8opensim container
  community.docker.docker_container:
    name: l8opensim
    image: "{{ l8opensim_image }}"
    state: started
    restart_policy: "{{ l8opensim_restart_policy }}"
    privileged: true
    network_mode: host
    devices:
      - /dev/net/tun:/dev/net/tun
    command: >-
      -auto-start-ip {{ l8opensim_auto_start_ip }}
      -auto-count {{ l8opensim_auto_count }}
      -auto-netmask {{ l8opensim_auto_netmask }}
      -port {{ l8opensim_web_port }}
  tags: ["l8opensim"]
