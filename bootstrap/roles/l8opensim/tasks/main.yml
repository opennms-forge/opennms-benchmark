---
- name: Pull l8opensim Docker image
  community.docker.docker_image:
    name: "{{ l8opensim_image }}"
    source: pull
  tags: ["l8opensim"]

- name: Run l8opensim container
  community.docker.docker_container:
    name: l8opensim
    image: "{{ l8opensim_image }}"
    state: started
    restart_policy: "{{ l8opensim_restart_policy }}"
    capabilities:
      - NET_ADMIN
    published_ports:
      - "{{ l8opensim_snmp_port }}:161/udp"
      - "{{ l8opensim_web_port }}:{{ l8opensim_web_port }}/tcp"
    command: >
      -auto-start-ip {{ l8opensim_auto_start_ip }}
      -auto-count {{ l8opensim_auto_count }}
  tags: ["l8opensim"]
