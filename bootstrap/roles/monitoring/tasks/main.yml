---
- name: Create Grafana dashboards provisioning directory
  ansible.builtin.file:
    path: /etc/grafana/provisioning/dashboards
    state: directory
    mode: "0755"
  tags: ["monitoring", "grafana"]

- name: Deploy benchmark dashboards
  ansible.builtin.copy:
    src: grafana/provisioning/dashboards/
    dest: /etc/grafana/provisioning/dashboards/
    mode: "0644"
  notify: Restart grafana
  tags: ["monitoring", "grafana"]

- name: Enable IPv4 forwarding temporarily
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: 1
    state: present
    reload: true
  tags: ["ipv4-forwarding"]

- name: Enable IPv6 forwarding temporarily
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: 1
    state: present
    reload: true
  tags: ["ipv6-forwarding"]

- name: Persistent IPv4 forwarding
  ansible.posix.sysctl:
    name: net.ipv4.ip_forward
    value: "1"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-ipv4-forward.conf
  tags: ["ipv4-forwarding"]

- name: Persistent IPv6 forwarding
  ansible.posix.sysctl:
    name: net.ipv6.conf.all.forwarding
    value: "1"
    state: present
    reload: true
    sysctl_file: /etc/sysctl.d/99-ipv6-forward.conf
  tags: ["ipv6-forwarding"]
