---
apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    access: proxy
    url: http://192.0.2.200:9090/prometheus
    jsonData:
      httpMethod: POST
      manageAlerts: false
      prometheusType: Prometheus
      cacheLevel: "Low"
      disableRecordingRules: false
      incrementalQueryOverlapWindow: 10m
