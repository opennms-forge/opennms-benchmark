---
- name: Restart prometheus
  ansible.builtin.service:
    name: docker-compose@prometheus.service
    state: restarted

- name: Restart grafana
  ansible.builtin.service:
    name: grafana-server.service
    state: restarted
  failed_when: false

- name: Restart pgadmin
  ansible.builtin.service:
    name: docker-compose@pgadmin.service
    state: restarted

- name: Restart jaeger
  ansible.builtin.service:
    name: docker-compose@jaeger.service
    state: restarted

- name: Restart elasticvue
  ansible.builtin.service:
    name: docker-compose@elasticvue.service
    state: restarted

- name: Restart kafka-ui
  ansible.builtin.service:
    name: docker-compose@kafka-ui.service
    state: restarted
