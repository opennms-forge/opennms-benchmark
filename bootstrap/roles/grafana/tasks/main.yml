---
- name: Create Grafana dashboards provisioning directory
  ansible.builtin.file:
    path: "{{ grafana_provisioning_dashboards_dir }}"
    state: directory
    mode: "0755"
  tags: ["monitoring", "grafana"]

- name: Deploy benchmark dashboards
  ansible.builtin.copy:
    src: provisioning/dashboards/
    dest: "{{ grafana_provisioning_dashboards_dir }}/"
    mode: "0644"
  notify: Restart grafana
  tags: ["monitoring", "grafana"]

- name: Create Grafana datasources provisioning directory
  ansible.builtin.file:
    path: "{{ grafana_provisioning_datasources_dir }}"
    state: directory
    mode: "0755"
  tags: ["monitoring", "grafana"]

- name: Deploy benchmark datasources
  ansible.builtin.copy:
    src: provisioning/datasources/
    dest: "{{ grafana_provisioning_datasources_dir }}/"
    mode: "0644"
  notify: Restart grafana
  tags: ["monitoring", "grafana"]
