---
- name: "Install Docker dependencies"
  ansible.builtin.apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg-agent
      - software-properties-common
    state: present
  tags: ["docker"]

- name: "Uninstall old Docker versions"
  ansible.builtin.apt:
    pkg:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  tags: ["docker"]

# get_url can silently leave a 0-byte file behind (e.g. CDN returns 200 with
# empty body). apt then rejects the repo as "not signed" and subsequent runs
# fail at apt_update before docker_ce runs, so scrub any bad key on failure.
- name: Download and validate repository GPG key
  tags: ["docker"]
  block:
    - name: Download repository GPG key
      ansible.builtin.get_url:
        url: "{{ repo_uri_pubkey }}"
        dest: "{{ repo_signed_by }}"
        mode: "0644"

    - name: Validate downloaded GPG key is a PGP public key block
      ansible.builtin.command:
        cmd: "grep -q '^-----BEGIN PGP PUBLIC KEY BLOCK-----' {{ repo_signed_by }}"
      changed_when: false
  rescue:
    - name: Remove invalid GPG key so the next run can retry cleanly
      ansible.builtin.file:
        path: "{{ repo_signed_by }}"
        state: absent

    - name: Fail with diagnostic message
      ansible.builtin.fail:
        msg: >-
          Downloaded GPG key at {{ repo_signed_by }} was missing or not a valid
          PGP public key block. Removed; retry the play.

- name: Add repository with signed-by option
  ansible.builtin.template:
    src: docker.sources.j2
    dest: /etc/apt/sources.list.d/docker.sources
    owner: root
    group: root
    mode: "0644"
  tags: ["docker"]

- name: Install Docker-CE packages
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    update_cache: true
    state: present
  tags: ["docker"]

- name: Add docker compose systemd unit
  ansible.builtin.copy:
    src: "docker-compose@.service"
    dest: "/etc/systemd/system/docker-compose@.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
  tags: ["docker-compose"]

- name: Set Docker Daemon settings
  ansible.builtin.copy:
    src: daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart docker
  tags: ["systemd"]

- name: Add labuser to the docker group
  ansible.builtin.user:
    name: labuser
    groups: docker
    append: true
  tags: ["docker"]
