---
- name: "Install Docker dependencies"
  ansible.builtin.apt:
    pkg:
      - apt-transport-https
      - ca-certificates
      - curl
      - gnupg-agent
      - software-properties-common
    state: present
  tags: ["docker"]

- name: "Uninstall old Docker versions"
  ansible.builtin.apt:
    pkg:
      - docker
      - docker-engine
      - docker.io
      - containerd
      - runc
    state: absent
  tags: ["docker"]

- name: Download repository GPG key
  ansible.builtin.get_url:
    url: "{{ repo_uri_pubkey }}"
    dest: "{{ repo_signed_by }}"
    mode: "0644"
  tags: ["docker"]

- name: Add repository with signed-by option
  ansible.builtin.template:
    src: docker.sources.j2
    dest: /etc/apt/sources.list.d/docker.sources
    owner: root
    group: root
    mode: "0644"
  tags: ["docker"]

- name: Install Docker-CE packages
  ansible.builtin.apt:
    pkg:
      - docker-ce
      - docker-ce-cli
      - containerd.io
    update_cache: true
    state: present
  tags: ["docker"]

- name: Add docker compose systemd unit
  ansible.builtin.copy:
    src: "docker-compose@.service"
    dest: "/etc/systemd/system/docker-compose@.service"
    owner: root
    group: root
    mode: "0644"
  notify:
    - Reload systemd
  tags: ["docker-compose"]

- name: Set Docker Daemon settings
  ansible.builtin.copy:
    src: daemon.json
    dest: /etc/docker/daemon.json
    owner: root
    group: root
    mode: "0644"
  notify:
    - Restart docker
  tags: ["systemd"]

- name: Add labuser to the docker group
  ansible.builtin.user:
    name: labuser
    groups: docker
    append: true
  tags: ["docker"]
