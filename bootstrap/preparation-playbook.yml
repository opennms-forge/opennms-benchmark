---
# # file: opennms-playbook.yml

- name: Wait for system readiness
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for SSH
      ansible.builtin.wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to complete
      become: true
      ansible.builtin.command: cloud-init status --wait
      changed_when: false
      failed_when: result.rc not in [0, 2]
      register: result
      timeout: 120

- name: Basic configuration and tooling
  hosts: all
  become: true
  roles:
    - apt_update
    - common
    - prometheus.prometheus.node_exporter

- name: Docker Engine
  hosts: docker_engine
  become: true
  roles:
    - docker_ce

- name: Monitoring services
  hosts: mon_servers
  become: true
  roles:
    - ip_forwarding
    - grafana
    - pgadmin
    - app_starter
    - kibana
    - prometheus
    - jaeger
    - traefik

- name: Net-Simulator
  hosts: net_sim
  become: true
  roles:
    - role: rp_filter
      vars:
        rp_filter_interfaces:
          - all
          - default
          - "{{ l8opensim_net_interface }}"
    - net_snmp
    - l8opensim

- name: Minion
  hosts: minion
  become: true
  roles:
    - rp_filter

- name: Kafka-UI
  hosts: kafka_ui
  become: true
  roles:
    - kafka_ui

- name: Elasticsearch
  hosts: elasticsearch
  become: true
  roles:
    - stub_elasticsearch
