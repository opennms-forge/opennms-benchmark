## file: opennms-playbook.yml

- name: Wait for system readiness
  hosts: all
  gather_facts: false
  tasks:
    - name: Wait for SSH
      wait_for_connection:
        timeout: 300

    - name: Wait for cloud-init to complete
      become: true
      command: cloud-init status --wait
      changed_when: false
      timeout: 120

- name: Basic configuration and tooling
  hosts: all
  become: true
  roles:
    - apt-update
    - common
    - prometheus.prometheus.node_exporter

- name: Docker Engine
  hosts: docker_engine
  become: true
  roles:
    - docker-ce

- name: Monitoring services
  hosts: mon_servers
  become: true
  roles:
    - monitoring
    - traefik

- name: SNMP-Simulator
  hosts: snmp_sim
  become: true
  roles:
    - net-snmp
    - l8opensim

- name: Kafka-UI
  hosts: kafka_ui
  become: true
  roles:
    - kafka-ui
