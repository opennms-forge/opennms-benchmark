---
name: Ansible Lint

on:
  pull_request:
    paths:
      - "bootstrap/**"
      - "experiments/**"
      - ".ansible-lint"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - name: Run ansible-lint
        uses: ansible/ansible-lint@v25
        with:
          requirements_file: bootstrap/requirements.yml
